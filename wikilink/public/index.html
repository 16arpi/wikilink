<!DOCTYPE html>
<html lang="fr" >
    <head>
        <title>Wikilink Generator</title>
        <meta charset="utf-8" />
        <style>
            body {
                margin: 10px;
                padding: 10px;
                max-width: 700px;
                margin: 0 auto;

                font-family: sans-serif;
            }

            body > * {
                display: block;
                margin: 1em 0;
                width: 100%;
                font-size: 14pt;
            }

            body textarea {
                border: 1px solid #aaa;
                height: 200px;
                padding: 10px;
                box-sizing: border-box;
            }

            body #result {
                background: #fefae0;
                padding: 10px;
                box-sizing: border-box;
            }

            body #result a {
                color: #36c;
            }

            script {
                display: none;
            }



        </style>
    </head>
    <body data-theme="light">
        <h2>Wikilink Generator</h2>
        <p>Plain text to Wikipedia paragraphs full of wiki links! </p>
        <textarea id="text" >Karl Marx (/kaʁl maʁks/ ; en allemand : /kaːɐ̯l ˈmaːɐ̯ks/), né le 5 mai 1818 à Trèves dans le grand-duché du Bas-Rhin et mort le 14 mars 1883 à Londres, est un philosophe, économiste, historien, sociologue, journaliste, théoricien de la révolution, du socialisme et du communisme, et un idéologue prussien.</textarea>
        <input id="submit" type="button" value="Submit" />
        <p id="result" ></p>
        <script>
            const textarea = document.getElementById("text");
            const button = document.getElementById("submit");
            const result = document.getElementById("result");

            button.onclick = () => {
                button.disabled = true
                fetch("/generate", {
                    method: "POST",
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: textarea.value
                    })
                }).then(res => {
                    button.disabled = false
                    res.json().then(data => {
                        result.innerHTML = data.html;
                    })
                }).catch(() => {
                    button.disabled = false
                })
            }
        </script>
    </body>
</html>
